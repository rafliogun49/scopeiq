name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scopeiq
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: scopeiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scopeiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://scopeiq:changeme@localhost:5432/scopeiq_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: uv run mypy app

      - name: Test (pytest)
        run: uv run pytest -q

  frontend-build:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so TanStack Router generates routeTree.gen.ts,
      # then typecheck can import it.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend/

      - name: Build MCP image
        run: docker build -f backend/Dockerfile.mcp backend/

      - name: Build frontend prod image
        run: docker build -f frontend/Dockerfile.prod frontend/
